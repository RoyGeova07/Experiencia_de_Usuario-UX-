<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RugMiniChat</title>
    <script type="module">

        //dependencia externa , vanila
        import{io}from'https://cdn.socket.io/4.3.2/socket.io.esm.min.js'

        const socket=io({

            auth:{

                //esto es para evitar problemas de tiempo entre el cliente y el servidor, 
                //se le dice que no hay diferencia de tiempo entre el cliente y el servidor
                serverOffset:0


            }

        })
        const form=document.getElementById('form')//traemos el formulario
        const input=document.getElementById('input')//input para poder leer la informacion del mensaje
        const messages=document.getElementById('messages')//aqui es donde se van a guardar los mensajes 
        

        //cuando en el socket reciba un mensage de 'chat message', se recibira como parametro el mensaje 
        socket.on('chat message',(msg,serverOffset)=>
        {

            const item=`<li>${msg}</li>`
            messages.insertAdjacentHTML('beforeend',item)//antes de q termine el elemento e insertar el html del item
            //aqui se actualiza el serverOffset cada vez que se recibe un mensaje, 
            //esto es para evitar problemas de tiempo entre el cliente y el servidor
            //en resumen es para no mezclar los mensajes, para que se muestren en el orden correcto, 
            //y para evitar problemas de tiempo entre el cliente y el servidor
            socket.auth.serverOffset=serverOffset

        })

        //aqui vamos a escuhar el evento
        form.addEventListener('submit',(e)=>//cuando se haga submit se evita el comportamiento por defecto 
        {

            e.preventDefault()//quitar evento por defecto

            //si se tiene un valor en el input
            if(input.value)
            {

                socket.emit('chat message',input.value)//se emite un chatMessage, si se tiene un valor en el formulario, el input le vamos a enviar el valor al servidor
                input.value=''//se resetea el valor en blanco cuando se envia un valor 

            }

        })

    </script>
    <style>

        *,
        *::before
        *::after
        {

            box-sizing: border-box;

        }

        
        :root
        {

            color-scheme: light dark;

        }

        body
        {

            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            display: grid;
            place-content: center;
            height: 100vh;
            padding: 36px 36px 100px 36px;
            grid-template-rows: 1fr;

        }
        #chat
        {

            border: 1px solid #ccc;
            border-radius: 4px;
            overflow: hidden ;
            width: 350px;
            height: 100%;
            position: relative;


        }


        #form
        {

            bottom: 0;
            display: flex;
            height: 48px;
            left: 0;
            padding: 4px;
            position: absolute;
            right: 0;

        }

        #input
        {

            border-radius: 9999px;
            border: 1px solid #eee;
            flex: 1;
            margin: 4px;
            padding: 0 8px;

        }

        #input::focus
        {

            outline: 0;


        }

        #form>button 
        {

            background: #09f;
            color: #fff;
            border: 0;
            margin: 4px;
            border-radius: 4px;

        }

        #form>button:hover
        {

            background: #0cf;

        }

        
        #messages
        {

            list-style-type: none;
            margin: 0;
            padding: 0;


        }
        #messages>li
        {

            padding: .5rem 1 rem;

        }

        #messages>li:nth-child(odd)
        {

            background: #000;

        }

    </style>

</head>
<body>
    
    <section id="chat">

        <ul id="messages"></ul>

        <form id="form">

            <input type="text" name="message" id="input" placeholder="Type a message"
            autocomplete="off" />
            <button type="submit">Enviar</button>

        </form>

    </section>

</body>
</html>
